<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>第一幕 · 海边</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');
  
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  html, body {
    width: 100%; 
    height: 100%;
    background: #000000;
    font-family: 'Noto Serif SC', serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  
  .scene-container {
    width: 100vw; 
    height: 100vh;
    position: relative;
    cursor: pointer;
    user-select: none;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .scene-image {
    width: 100%; 
    height: 100%;
    /* 核心修改：使用 contain 保证图片 100% 完整展示 */
    object-fit: contain; 
    object-position: center; 
    display: block;
  }
  
  .scene-overlay {
    position: absolute; 
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }
  
  .act-label {
    position: absolute; 
    top: 30px; 
    left: 30px;
    color: rgba(255, 255, 255, 0.9);
    z-index: 10;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }
  
  .act-num { 
    font-size: 14px; 
    letter-spacing: 3px; 
    opacity: 0.8; 
    margin-bottom: 5px;
  }
  
  .act-title { 
    font-size: 28px; 
    font-weight: 600; 
    letter-spacing: 5px; 
  }

  .tap-hint {
    position: absolute; 
    bottom: 50px; 
    left: 50%; 
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 14px;
    letter-spacing: 2px;
    display: flex; 
    align-items: center; 
    gap: 10px;
    animation: pulse 2.5s infinite;
    z-index: 10;
  }
  
  .dot { 
    width: 4px; 
    height: 4px; 
    background: currentColor; 
    border-radius: 50%; 
  }

  @keyframes pulse { 
    0%, 100% { opacity: 0.3; } 
    50% { opacity: 1; } 
  }

  /* 对话层样式 */
  .dialogue-overlay {
    position: fixed; 
    inset: 0; 
    z-index: 50;
    opacity: 0;
    visibility: hidden;
    display: flex; 
    flex-direction: column; 
    justify-content: flex-end;
    transition: all 0.5s ease;
  }
  
  .dialogue-overlay.active { 
    opacity: 1;
    visibility: visible;
  }
  
  .dialogue-backdrop {
    position: absolute; 
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: -1;
  }
  
  .close-hint {
    position: absolute; 
    top: 40px; 
    right: 30px;
    color: rgba(255, 255, 255, 0.5); 
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  
  .dialogue-box {
    padding: 0 40px 60px 40px;
    color: #fff;
    transform: translateY(20px);
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .dialogue-overlay.active .dialogue-box {
    transform: translateY(0);
  }
  
  .char-row { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 20px; 
  }
  
  .char-dot { 
    width: 6px; 
    height: 6px; 
    background: #fff; 
    border-radius: 50%; 
    box-shadow: 0 0 8px rgba(255,255,255,0.8);
  }
  
  .char-name { 
    font-size: 18px; 
    font-weight: 600; 
    letter-spacing: 3px; 
  }
  
  .deco-line { 
    width: 100%; 
    height: 1px; 
    background: linear-gradient(90deg, rgba(255,255,255,0.4) 0%, transparent 80%); 
    margin-bottom: 30px; 
  }
  
  .dialogue-lines { 
    display: flex; 
    flex-direction: column; 
    gap: 18px; 
    font-size: 16px; 
    line-height: 1.8; 
    color: rgba(255, 255, 255, 0.85); 
    letter-spacing: 1px;
  }
  
  .d-line.key { 
    font-weight: 700; 
    color: #fff; 
    font-size: 17px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); 
  }
</style>
</head>
